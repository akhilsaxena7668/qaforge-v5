<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>QAForge — Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --bg-surface: #18181b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --accent: #8b5cf6;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .offline-container {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 60px rgba(59,130,246,0.25);
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(59,130,246,0.15); }
      50% { box-shadow: 0 0 80px rgba(59,130,246,0.35); }
    }

    .offline-icon svg {
      width: 56px;
      height: 56px;
      opacity: 0.9;
    }

    .wifi-slash {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 36px;
      height: 36px;
      background: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--bg);
      box-shadow: 0 2px 8px rgba(239,68,68,0.4);
    }

    .wifi-slash svg {
      width: 18px;
      height: 18px;
    }

    .offline-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, var(--text), var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .offline-subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .offline-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-retry {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      font-weight: 700;
      padding: 0.875rem 2rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      box-shadow: 0 8px 20px rgba(59,130,246,0.3);
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(59,130,246,0.4);
    }

    .btn-retry:active {
      transform: translateY(0);
    }

    .status-bar {
      margin-top: 3rem;
      padding: 1rem 1.5rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .cached-hint {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(139,92,246,0.06) 0%, transparent 50%);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <div class="wifi-slash">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="20" y2="20"/>
        </svg>
      </div>
    </div>

    <h1 class="offline-title">You're Offline</h1>
    <p class="offline-subtitle">
      It looks like you've lost your internet connection.<br>
      QAForge needs a connection to generate tests with AI.
    </p>

    <div class="offline-actions">
      <button class="btn-retry" onclick="window.location.reload()">
        ↻ Try Again
      </button>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span>NETWORK: DISCONNECTED</span>
    </div>

    <p class="cached-hint">Previously cached pages may still be accessible.</p>
  </div>

  <script>
    // Auto-reload when connection returns
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
